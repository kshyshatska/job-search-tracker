<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Application | Job Search Tracker</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="app-navbar">
    <a class="brand" th:href="@{/dashboard}"><i data-lucide="briefcase-business"></i>Job Tracker</a>
    <div class="navbar-links">
        <a class="nav-link" th:href="@{/dashboard}"><i data-lucide="layout-dashboard"></i>Dashboard</a>
        <a class="nav-link" th:href="@{/jobs/search}"><i data-lucide="search"></i>Search Jobs</a>
        <a class="nav-link active" th:href="@{/applications}"><i data-lucide="columns-3"></i>My Applications</a>
    </div>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="nav-link nav-button" type="submit"><i data-lucide="log-out"></i>Logout</button>
    </form>
</nav>

    <main class="content">
        <div class="page-header">
            <div>
                <h1 th:text="${jobApplication.title}">Java Developer</h1>
            </div>
            <a class="button ghost" th:href="@{/applications/{id}(id=${jobApplication.id})}">Cancel</a>
        </div>

        <section class="panel narrow-panel">
            <form class="form-stack" th:action="@{/applications/{id}/edit(id=${jobApplication.id})}" th:object="${jobApplication}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <label>
                        Status
                        <select th:field="*{status}">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}">SAVED</option>
                        </select>
                    </label>
                    <label>
                        Priority
                        <select th:field="*{priority}">
                            <option th:each="priority : ${priorities}" th:value="${priority}" th:text="${priority}">MEDIUM</option>
                        </select>
                    </label>
                    <label>
                        Salary
                        <input type="text" th:field="*{salary}" placeholder="45000-55000 EUR">
                    </label>
                    <label>
                        Job type
                        <select th:field="*{jobType}">
                            <option value="">Not specified</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Internship">Internship</option>
                            <option value="Contract">Contract</option>
                        </select>
                    </label>
                </div>

                <label>
                    Add note
                    <textarea name="newNoteText" rows="5" placeholder="Interview time, contact person, next step..."></textarea>
                </label>

                <button class="button primary" type="submit">Save changes</button>
            </form>
        </section>
    </main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
