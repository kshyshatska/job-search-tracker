<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редагування заявки | JobPath</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('applications')}"></nav>

<main class="content">
    <div class="page-header">
        <div>
            <h1 th:text="${jobApplication.title}">Java Developer</h1>
        </div>
        <a class="button ghost" th:href="@{/applications/{id}(id=${jobApplication.id})}">Скасувати</a>
    </div>

    <section class="panel narrow-panel">
        <form class="form-stack" th:action="@{/applications/{id}/edit(id=${jobApplication.id})}" th:object="${jobApplication}" method="post" data-loading-form>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-grid">
                <label>
                    Статус
                    <select th:field="*{status}">
                        <option th:each="status : ${statuses}" th:value="${status}" th:text="${statusLabels.get(status)}">Збережено</option>
                    </select>
                </label>
                <label>
                    Пріоритет
                    <select th:field="*{priority}">
                        <option th:each="priority : ${priorities}" th:value="${priority}" th:text="${priorityLabels.get(priority)}">Середній</option>
                    </select>
                </label>
                <label>
                    Зарплата
                    <input type="text" th:field="*{salary}" placeholder="45000-55000 EUR">
                </label>
                <label>
                    Тип зайнятості
                    <select th:field="*{jobType}">
                        <option value="">Не вказано</option>
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Internship">Internship</option>
                        <option value="Contract">Contract</option>
                    </select>
                </label>
            </div>

            <label>
                Нова нотатка
                <textarea name="newNoteText" rows="5" placeholder="Ваші нотатки..."></textarea>
            </label>

            <button class="button primary" type="submit" data-loading-label="Зберігаємо..."><i data-lucide="save"></i>Зберегти зміни</button>
        </form>
    </section>
</main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>if (window.lucide) lucide.createIcons();</script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
