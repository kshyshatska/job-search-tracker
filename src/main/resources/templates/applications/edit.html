<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редагування заявки | Job Search Tracker</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="app-navbar">
    <a class="brand" th:href="@{/dashboard}"><i data-lucide="briefcase-business"></i>Job Tracker</a>
    <div class="navbar-links">
        <a class="nav-link" th:href="@{/dashboard}"><i data-lucide="layout-dashboard"></i>Дашборд</a>
        <a class="nav-link" th:href="@{/jobs/search}"><i data-lucide="search"></i>Пошук</a>
        <a class="nav-link active" th:href="@{/applications}"><i data-lucide="columns-3"></i>Заявки</a>
    </div>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button class="nav-link nav-button" type="submit"><i data-lucide="log-out"></i>Вийти</button>
    </form>
</nav>

<main class="content">
    <div class="page-header">
        <div>
            <h1 th:text="${jobApplication.title}">Java Developer</h1>
        </div>
        <a class="button ghost" th:href="@{/applications/{id}(id=${jobApplication.id})}">Скасувати</a>
    </div>

    <section class="panel narrow-panel">
        <form class="form-stack" th:action="@{/applications/{id}/edit(id=${jobApplication.id})}" th:object="${jobApplication}" method="post">
            <div class="form-grid">
                <label>
                    Статус
                    <select th:field="*{status}">
                        <option th:each="status : ${statuses}" th:value="${status}" th:text="${statusLabels.get(status)}">Збережено</option>
                    </select>
                </label>
                <label>
                    Пріоритет
                    <select th:field="*{priority}">
                        <option th:each="priority : ${priorities}" th:value="${priority}" th:text="${priorityLabels.get(priority)}">Середній</option>
                    </select>
                </label>
                <label>
                    Зарплата
                    <input type="text" th:field="*{salary}" placeholder="45000-55000 EUR">
                </label>
                <label>
                    Тип зайнятості
                    <select th:field="*{jobType}">
                        <option value="">Не вказано</option>
                        <option value="Full-time">Повна зайнятість</option>
                        <option value="Part-time">Часткова зайнятість</option>
                        <option value="Internship">Стажування</option>
                        <option value="Contract">Контракт</option>
                    </select>
                </label>
            </div>

            <label>
                Додати нотатку
                <textarea name="newNoteText" rows="5" placeholder="Час співбесіди, контактна особа, наступний крок..."></textarea>
            </label>

            <button class="button primary" type="submit">Зберегти зміни</button>
        </form>
    </section>
</main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
