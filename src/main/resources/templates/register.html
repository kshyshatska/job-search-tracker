<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація | Job Search Tracker</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="login-body">
<main class="login-shell">
    <section class="login-panel">
        <div class="auth-header">
            <span class="brand-mark"><i data-lucide="user-plus"></i></span>
            <h1>Створити акаунт</h1>
        </div>

        <form class="form-stack" th:action="@{/register}" th:object="${registration}" method="post">
            <label>
                Email або логін
                <input type="text" th:field="*{username}" placeholder="student@example.com" required autofocus>
            </label>

            <label>
                Пароль
                <input type="password" th:field="*{password}" placeholder="Введіть пароль" required>
            </label>

            <button class="button primary" type="submit">Створити</button>

            <p class="alert error" th:if="${error}" th:text="${error}">Помилка реєстрації.</p>
            <p class="auth-switch"><a class="text-link" th:href="@{/login}">Увійти</a></p>
        </form>
    </section>
</main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
