<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<body>
<nav class="app-navbar" th:fragment="navbar(active)">
    <a class="brand" th:href="@{/dashboard}"><span class="app-logo">JP</span>JobPath</a>
    <div class="navbar-links">
        <a class="nav-link" th:classappend="${active == 'dashboard'} ? 'active'" th:href="@{/dashboard}">Головна</a>
        <a class="nav-link" th:classappend="${active == 'jobs'} ? 'active'" th:href="@{/jobs/search}">Вакансії</a>
        <a class="nav-link" th:classappend="${active == 'applications'} ? 'active'" th:href="@{/applications}">Трекер</a>
    </div>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="nav-link nav-button" type="submit"><i data-lucide="log-out"></i>Вийти</button>
    </form>
</nav>
</body>
</html>
