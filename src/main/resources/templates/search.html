<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пошук вакансій | Job Search Tracker</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="app-navbar">
    <a class="brand" th:href="@{/dashboard}"><i data-lucide="briefcase-business"></i>Job Tracker</a>
    <div class="navbar-links">
        <a class="nav-link" th:href="@{/dashboard}"><i data-lucide="layout-dashboard"></i>Дашборд</a>
        <a class="nav-link active" th:href="@{/jobs/search}"><i data-lucide="search"></i>Пошук</a>
        <a class="nav-link" th:href="@{/applications}"><i data-lucide="columns-3"></i>Заявки</a>
    </div>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button class="nav-link nav-button" type="submit"><i data-lucide="log-out"></i>Вийти</button>
    </form>
</nav>

    <main class="content">
        <div class="page-header">
            <div>
                <h1>Пошук вакансій</h1>
            </div>
        </div>

        <p class="alert success" th:if="${message}" th:text="${message}">Вакансію збережено.</p>

        <form class="search-form expanded panel" th:action="@{/jobs/search}" th:object="${searchRequest}" method="post">
            <label>
                Ключові слова
                <input type="text" th:field="*{keyword}" placeholder="Java Developer">
            </label>
            <label>
                Локація
                <input type="text" th:field="*{location}" placeholder="Hamburg">
            </label>
            <label>
                Формат
                <select th:field="*{workMode}">
                    <option value="">Будь-який</option>
                    <option value="remote">Віддалено</option>
                    <option value="onsite">Офіс</option>
                    <option value="hybrid">Гібрид</option>
                </select>
            </label>
            <label>
                Рівень
                <select th:field="*{level}">
                    <option value="">Будь-який</option>
                    <option value="internship">Стажування</option>
                    <option value="junior">Junior</option>
                    <option value="middle">Middle</option>
                </select>
            </label>
            <label>
                Тип
                <select th:field="*{jobType}">
                    <option value="">Будь-який</option>
                    <option value="Full-time">Повна зайнятість</option>
                    <option value="Part-time">Часткова зайнятість</option>
                    <option value="Internship">Стажування</option>
                </select>
            </label>
            <label>
                Опубліковано
                <select th:field="*{datePosted}">
                    <option value="">Будь-коли</option>
                    <option value="last 24 hours">24 години</option>
                    <option value="last 7 days">7 днів</option>
                    <option value="last 30 days">30 днів</option>
                </select>
            </label>
            <button class="button primary" type="submit">Шукати</button>
        </form>

        <div class="results-summary" th:if="${!#lists.isEmpty(results)}">
            <span th:text="${results.size() + ' вакансій'}">0 вакансій</span>
        </div>

        <section class="cards-list">
            <article class="job-card" th:each="job : ${results}">
                <div class="card-main">
                    <h2 th:text="${job.title}">Java Developer</h2>
                    <p class="meta" th:text="${job.company + ' · ' + job.location}">Компанія · Hamburg</p>
                    <div class="chip-row">
                        <span class="chip" th:if="${job.salary != null && !#strings.isEmpty(job.salary)}" th:text="${job.salary}">Зарплата</span>
                        <span class="chip" th:if="${job.jobType != null && !#strings.isEmpty(job.jobType)}" th:text="${job.jobType}">Тип</span>
                    </div>
                    <p class="description" th:text="${job.description}">Опис вакансії.</p>
                    <a class="text-link" th:href="${job.sourceUrl}" target="_blank" rel="noopener">Відкрити вакансію</a>
                </div>
                <form th:if="${!savedSourceUrls.contains(job.sourceUrl)}" th:action="@{/jobs/save}" method="post">
                    <input type="hidden" name="title" th:value="${job.title}">
                    <input type="hidden" name="company" th:value="${job.company}">
                    <input type="hidden" name="location" th:value="${job.location}">
                    <input type="hidden" name="description" th:value="${job.description}">
                    <input type="hidden" name="sourceUrl" th:value="${job.sourceUrl}">
                    <input type="hidden" name="salary" th:value="${job.salary}">
                    <input type="hidden" name="jobType" th:value="${job.jobType}">
                    <button class="button secondary" type="submit">Зберегти</button>
                </form>
                <button th:if="${savedSourceUrls.contains(job.sourceUrl)}" class="button disabled-button" type="button" disabled>У трекері</button>
            </article>

            <div class="empty-state" th:if="${#lists.isEmpty(results)}">
            </div>
        </section>
    </main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
