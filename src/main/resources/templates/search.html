<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакансії | JobPath</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('jobs')}"></nav>

<main class="content">
    <div class="page-header">
        <div>
            <h1>Вакансії</h1>
        </div>
    </div>

    <p class="alert success" th:if="${message}" th:text="${message}">Вакансію збережено.</p>
    <p class="alert warning" th:if="${apiMessage}" th:text="${apiMessage}">Додайте JOOBLE_API_KEY.</p>

    <section class="search-layout">
        <div>
            <form class="panel search-form" th:action="@{/jobs/search}" th:object="${searchRequest}" method="post" data-loading-form>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label>
                    Ключові слова
                    <input type="text" th:field="*{keyword}" placeholder="Java Developer">
                </label>
                <label>
                    Локація
                    <input type="text" th:field="*{location}" placeholder="Hamburg">
                </label>
                <label>
                    Формат роботи
                    <select th:field="*{workMode}">
                        <option value="">Будь-який</option>
                        <option value="remote">Remote</option>
                        <option value="onsite">Office</option>
                        <option value="hybrid">Hybrid</option>
                    </select>
                </label>
                <label>
                    Рівень
                    <select th:field="*{level}">
                        <option value="">Будь-який</option>
                        <option value="internship">Internship</option>
                        <option value="junior">Junior</option>
                        <option value="middle">Middle</option>
                        <option value="senior">Senior</option>
                    </select>
                </label>
                <label>
                    Тип
                    <select th:field="*{jobType}">
                        <option value="">Будь-який</option>
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Contract">Contract</option>
                    </select>
                </label>
                <button class="button primary" type="submit" data-loading-label="Шукаємо..."><i data-lucide="search"></i>Шукати</button>
            </form>

            <div class="results-summary">
                <span><strong th:text="${#lists.size(results)}">0</strong> знайдено</span>
                <span th:if="${joobleConfigured}">Джерело: Jooble</span>
                <span th:if="${!joobleConfigured}">Jooble API key не задано</span>
            </div>

            <section class="cards-list">
                <article class="job-card" th:each="job : ${results}">
                    <div class="card-main">
                        <div class="job-title-row">
                            <span class="company-logo" th:text="${#strings.isEmpty(job.company) ? 'J' : #strings.substring(job.company, 0, 1)}">J</span>
                            <div>
                                <h2 th:text="${job.title}">Lead UI/UX Designer</h2>
                                <p class="meta" th:text="${job.company + ' · ' + job.location}">Jooble · Remote</p>
                            </div>
                        </div>
                        <div class="chip-row">
                            <span class="chip" th:if="${job.salary != null && !#strings.isEmpty(job.salary)}" th:text="${job.salary}">Salary</span>
                            <span class="chip" th:if="${job.jobType != null && !#strings.isEmpty(job.jobType)}" th:text="${job.jobType}">Full-time</span>
                            <span class="chip">Jooble</span>
                        </div>
                        <p class="description" th:text="${job.description}">Опис вакансії.</p>
                        <a class="text-link" th:href="${job.sourceUrl}" target="_blank" rel="noopener">Відкрити оригінал</a>
                    </div>
                    <div class="card-actions">
                        <form th:if="${!savedSourceUrls.contains(job.sourceUrl)}" th:action="@{/jobs/save}" method="post" data-loading-form>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="title" th:value="${job.title}">
                            <input type="hidden" name="company" th:value="${job.company}">
                            <input type="hidden" name="location" th:value="${job.location}">
                            <input type="hidden" name="description" th:value="${job.description}">
                            <input type="hidden" name="sourceUrl" th:value="${job.sourceUrl}">
                            <input type="hidden" name="salary" th:value="${job.salary}">
                            <input type="hidden" name="jobType" th:value="${job.jobType}">
                            <button class="button secondary" type="submit" data-loading-label="Зберігаємо..."><i data-lucide="bookmark"></i>Зберегти</button>
                        </form>
                        <button th:if="${savedSourceUrls.contains(job.sourceUrl)}" class="button disabled-button" type="button" disabled>У трекері</button>
                    </div>
                </article>

                <div class="empty-state large" th:if="${#lists.isEmpty(results)}">
                    <div>
                        <h2 th:if="${!searchAttempted}">Введіть запит для пошуку</h2>
                        <h2 th:if="${searchAttempted}">Вакансій не знайдено</h2>
                    </div>
                </div>
            </section>
        </div>
    </section>
</main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>if (window.lucide) lucide.createIcons();</script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
