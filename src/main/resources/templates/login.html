<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | Job Search Tracker</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="login-body">
<main class="login-shell">
    <section class="login-panel">
        <div class="auth-header">
            <span class="brand-mark"><i data-lucide="briefcase-business"></i></span>
            <h1>Job Search Tracker</h1>
        </div>

        <form class="form-stack" th:action="@{/login}" method="post">
            <label>
                Email або логін
                <input type="text" name="username" placeholder="student@example.com" required autofocus>
            </label>

            <label>
                Пароль
                <input type="password" name="password" placeholder="password123" required>
            </label>

            <button class="button primary" type="submit">Увійти</button>

            <p class="alert error" th:if="${param.error}">Неправильний логін або пароль.</p>
            <p class="alert success" th:if="${param.logout}">Ви вийшли з акаунта.</p>
            <p class="alert success" th:if="${message}" th:text="${message}">Акаунт створено.</p>
            <p class="auth-switch"><a class="text-link" th:href="@{/register}">Створити акаунт</a></p>
        </form>
    </section>
</main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
