<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Головна | JobPath</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('dashboard')}"></nav>

<main class="content">
    <div class="page-header">
        <div>
            <h1>Головна</h1>
        </div>
        <a class="button primary" th:href="@{/jobs/search}"><i data-lucide="search"></i>Знайти вакансії</a>
    </div>

    <section class="dashboard-grid" th:if="${totalApplications == 0}">
        <article class="panel panel-dark">
            <h2>Почніть із пошуку вакансій</h2>
            <a class="button secondary" th:href="@{/jobs/search}">Перейти до вакансій</a>
        </article>
    </section>

    <section class="metrics-grid">
        <article class="metric-card">
            <span class="metric-icon"><i data-lucide="bookmark"></i></span>
            <strong th:text="${totalApplications}">0</strong>
            <span>Усього у трекері</span>
        </article>
        <article class="metric-card" th:each="entry : ${statusCounts}">
            <span class="metric-icon"><i data-lucide="activity"></i></span>
            <strong th:text="${entry.value}">0</strong>
            <span th:text="${statusLabels.get(entry.key)}">Збережено</span>
        </article>
    </section>

    <section class="dashboard-stack">
        <article class="panel panel-blue">
            <div class="panel-header">
                <h2>Активні заявки</h2>
                <strong class="stat-value" style="color:#fff" th:text="${actionNeeded}">0</strong>
            </div>
        </article>

        <article class="panel">
            <div class="panel-header">
                <h2>Останні заявки</h2>
                <a class="text-link" th:href="@{/applications}">Всі</a>
            </div>
            <div class="empty-state compact-empty" th:if="${#lists.isEmpty(recentApplications)}">Заявок поки немає</div>
            <a class="list-row" th:each="jobApplication : ${recentApplications}" th:href="@{/applications/{id}(id=${jobApplication.id})}">
                <div class="job-title-row">
                    <span class="company-logo" th:text="${#strings.isEmpty(jobApplication.company) ? 'J' : #strings.substring(jobApplication.company, 0, 1)}">J</span>
                    <div>
                        <strong th:text="${jobApplication.title}">Java Developer</strong>
                        <span th:text="${jobApplication.company + ' · ' + jobApplication.location}">Компанія · Hamburg</span>
                    </div>
                </div>
                <span class="badge" th:classappend="${#strings.toLowerCase(jobApplication.status.name())}" th:text="${jobApplication.statusLabel}">Збережено</span>
            </a>
        </article>
    </section>
</main>
<script src="https://unpkg.com/lucide@latest"></script>
<script>if (window.lucide) lucide.createIcons();</script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
